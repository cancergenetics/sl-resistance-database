<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resistance Map for Clinical Trials</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <h1>Resistance Map for Clinical Trials</h1>
      <p id="meta-info" class="meta">Resistance prediction scores of the all human coding genes in 11 prominent clinical trial SL pairs.</p>
    </header>

    <section id="therapy-view" class="panel active" aria-live="polite">
      <div class="toolbar">
        <label for="biomarker-select">Select biomarker</label>
        <select id="biomarker-select"></select>
        <label for="target-select">Select target</label>
        <select id="target-select"></select>
      </div>

      <div id="pair-results-wrap" class="hidden">
        <p id="therapy-topn-note" class="topn-note"></p>

        <div class="toolbar">
          <label for="pair-gene-search">Search gene in selected pair</label>
          <input id="pair-gene-search" type="text" autocomplete="off" placeholder="Type first letters, e.g. ENSG000001">
          <div id="gene-suggest-box" class="suggest-box hidden"></div>
        </div>

        <table>
          <thead>
            <tr>
              <th>Gene</th>
              <th>Prediction Score</th>
              <th>Prediction Rank</th>
            </tr>
          </thead>
          <tbody id="therapy-results"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
